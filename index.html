<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="12.0107 - Subjects and Projects.">
    <meta name="author" content="12.0107">
    <meta name="theme-color" content="#ffffff">
    <title>12.0107</title>
    <!-- Using Google Fonts for Noto Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            background-color: #fff;
            font-family: 'Noto Sans', sans-serif;
            color: #000;
            overflow-x: hidden;
            /* Allow vertical scrolling on mobile */
        }

        /* Title */
        #title {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4rem;
        }

        /* Clean Menu Layout: Subjects */
        #projects-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto 0 0;
            width: 100%;
        }

        .project {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-decoration: none;
            color: #000;
            padding-bottom: 1rem;
            width: 100%;
            box-sizing: border-box;
            gap: 2rem;
            justify-content: flex-start;
        }

        .project:hover {
            opacity: 0.5;
        }

        .project-title {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .poetry-line {
            font-size: 0.9rem;
            font-style: italic;
            color: #666;
            letter-spacing: 0.05em;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
            }
            #title {
                margin-bottom: 3rem;
            }
            .project {
                gap: 1rem;
            }
            .project-title {
                font-size: 0.9rem;
            }
            .poetry-line {
                font-size: 0.8rem;
                max-width: 200px;
            }
        }

    </style>
    <!-- Import Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="title">12.0107</div>

    <div id="projects-section">
        <div style="font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.3; text-transform: uppercase; margin-bottom: 1rem;">Subjects</div>
        
        <a href="https://embody.120107.cloud" class="project">
            <div class="project-title">embodiment</div>
            <div class="poetry-line">pale hands in the dark, flesh becomes geometry, shape of the soul wakes</div>
        </a>
    </div>

</body>
</html>
