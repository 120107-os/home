<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>120107</title>
    <!-- Using Google Fonts for Noto Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fff;
            font-family: 'Noto Sans', sans-serif;
            color: #000;
        }

        /* Top Left: Title */
        #title {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* Title */
        #projects-section {
            position: absolute;
            top: 8rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 2rem;
            z-index: 10;
            max-width: 1200px;
        }

        .project {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-decoration: none;
            color: #000;
            transition: opacity 0.3s ease;
            width: 100%;
            justify-content: space-between;
        }

        .project:hover {
            opacity: 0.8;
        }

        /* Small 3D interactive icon */
        .project-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(235,235,235,1) 0%, rgba(255,255,255,0) 70%);
            position: relative;
            margin-right: 1.5rem;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .poetry-line {
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.6;
            letter-spacing: 0.05em;
            text-align: right;
            white-space: nowrap;
        }

    </style>
    <!-- Import Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="title">12.0107</div>

    <div id="projects-section">
        <div style="font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.3; text-transform: uppercase; margin-bottom: 1rem;">Subjects</div>
        
        <a href="https://embody.120107.cloud" class="project">
            <div style="display: flex; align-items: center;">
                <div id="embodiment-icon" class="project-icon"></div>
                <div class="project-title">embodiment</div>
            </div>
            <div class="poetry-line">pale hands in the dark, flesh becomes geometry, shape of the soul wakes</div>
        </a>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // Center: Project 1 (embodiment) Icon
        // ==========================================
        const embContainer = document.getElementById('embodiment-icon');
        const embScene = new THREE.Scene();
        
        const embCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        embCamera.position.set(0, 0, 150);

        const embRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        embRenderer.setSize(100, 100);
        embContainer.appendChild(embRenderer.domElement);

        const embControls = new OrbitControls(embCamera, embRenderer.domElement);
        embControls.enableZoom = false;
        embControls.enablePan = false;
        embControls.enableDamping = true;
        embControls.dampingFactor = 0.05;

        // Lighting for the hand
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        embScene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(50, 50, 50);
        embScene.add(dirLight);

        let handModel = null;
        const loader = new GLTFLoader();
        loader.load('v1/scene.glb', (gltf) => {
            handModel = gltf.scene;
            
            let found = false;
            // Hide all meshes except the one we want
            handModel.traverse((child) => {
                if (child.isMesh) {
                    if (child.name.includes('mesh_0000_left_0')) {
                        child.visible = true;
                        found = true;
                        // Assign dark material to contrast with white background
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0x222222,
                            metalness: 0.2,
                            roughness: 0.3
                        });
                    } else {
                        child.visible = false;
                    }
                }
            });
            
            if (!found) {
                console.error('Hand mesh mesh_0000_left_0 not found!');
            }
            
            // Center the entire model based ONLY on the visible hand mesh
            // so that it ignores the invisible meshes when computing the bounding box.
            let visibleMesh = null;
            handModel.traverse((child) => {
                if (child.isMesh && child.visible) {
                    visibleMesh = child;
                }
            });
            
            if (visibleMesh) {
                const box = new THREE.Box3().setFromObject(visibleMesh);
                const center = box.getCenter(new THREE.Vector3());
                handModel.position.sub(center);
            }
            
            // Scale it down to fit in the icon
            handModel.scale.set(0.8, 0.8, 0.8);

            embScene.add(handModel);
        });


        // ==========================================
        // Animation Loop
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Animate embodiment hand icon
            if (handModel) {
                // Gentle floating/rotating effect
                handModel.rotation.y = Math.sin(time * 0.5) * 0.2;
                handModel.position.y = Math.sin(time) * 2;
            }
            embControls.update();
            embRenderer.render(embScene, embCamera);
        }

        animate();

        // Handle possible resizing if needed (though containers are fixed size here)
    </script>
</body>
</html>
