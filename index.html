<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="12.0107 - Subjects and Projects.">
    <meta name="author" content="12.0107">
    <meta name="theme-color" content="#ffffff">
    <title>12.0107</title>
    <!-- Using Google Fonts for Noto Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            background-color: #fff;
            font-family: 'Noto Sans', sans-serif;
            color: #000;
            overflow-x: hidden;
            /* Allow vertical scrolling on mobile */
        }

        /* Title */
        #title {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4rem;
            text-decoration: none;
            color: #000;
            display: inline-block;
            cursor: pointer;
        }

        /* Clean Menu Layout: Subjects */
        #projects-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto 0 0;
            width: 100%;
        }

        .project {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-decoration: none;
            color: #000;
            padding-bottom: 1rem;
            width: 100%;
            box-sizing: border-box;
            gap: 2rem;
            justify-content: flex-start;
        }

        .project:hover {
            opacity: 0.5;
        }

        .project-title {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .poetry-line {
            font-size: 0.9rem;
            font-style: italic;
            color: #666;
            letter-spacing: 0.05em;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
            /* Flex layout requires this to prevent overflow breaking flex */
            min-width: 0; 
        }

        .marquee-container {
            text-overflow: clip !important;
        }
        
        .poetry-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-infinite linear infinite;
        }
        
        @keyframes scroll-infinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
            }
            #title {
                margin-bottom: 3rem;
            }
            .project {
                gap: 1rem;
            }
            .project-title {
                font-size: 0.9rem;
            }
            .poetry-line {
                font-size: 0.8rem;
                max-width: 200px;
            }
        }

    </style>
    <!-- Import Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <a href="https://120107.cloud" id="title">12.0107</a>

    <div id="projects-section">
        <div style="font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.3; text-transform: uppercase; margin-bottom: 1rem;">Subjects</div>
        
        <a href="https://embody.120107.cloud" class="project">
            <div class="project-title">embodiment</div>
            <div class="poetry-line">pale hands in the dark, flesh becomes geometry, shape of the soul wakes</div>
        </a>
    </div>

    <script>
        function initMarquee() {
            const isMobile = window.innerWidth <= 768;
            
            document.querySelectorAll('.poetry-line').forEach(line => {
                // Store original text if not present
                if (!line.hasAttribute('data-original-text')) {
                    line.setAttribute('data-original-text', line.innerText);
                }
                const text = line.getAttribute('data-original-text');
                
                // Reset first
                line.innerHTML = text;
                line.classList.remove('marquee-container');
                
                // On mobile, check if the native text overflows its container
                if (isMobile && line.scrollWidth > line.clientWidth) {
                    // Duplicate text for infinite scroll
                    const spacer = '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0';
                    line.innerHTML = `<span class="poetry-text">${text}${spacer}${text}${spacer}</span>`;
                    line.classList.add('marquee-container');
                    
                    const span = line.querySelector('.poetry-text');
                    const scrollDistance = span.scrollWidth / 2;
                    const duration = Math.max(4, scrollDistance / 30); 
                    span.style.animationDuration = `${duration}s`;
                }
            });
        }

        window.addEventListener('load', initMarquee);
        window.addEventListener('resize', initMarquee);
    </script>
</body>
</html>
